name: Update Fed odds

on:
  schedule:
    # Every 30 min, 13:00-22:59 UTC, Mon-Fri (= ~9am-7pm ET, US market hours)
    - cron: '*/30 13-22 * * 1-5'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_fed.py'
      - '.github/workflows/update-fed-odds.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Fed odds
        run: python3 scripts/fetch_fed.py
        continue-on-error: true

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fed.json data/fed_history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Fed odds $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
